services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peintures
      POSTGRES_USER: peintures
      POSTGRES_PASSWORD: peintures
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peintures"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/peintures
      SPRING_DATASOURCE_USERNAME: peintures
      SPRING_DATASOURCE_PASSWORD: peintures
      JWT_SECRET: dev-secret-key-change-in-production-minimum-32-chars
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      APP_BASE_URL: http://peintures.local:8000
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src   # hot reload
    depends_on:
      - backend

  # Intercepte les emails 2FA en dev (pas besoin d'un vrai SMTP)
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP (interne)
      - "8025:8025"   # UI web

  # Reverse proxy — port 8000 (port 80 occupé par WinRM sur Windows)
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - frontend
      - backend
      - mailhog

volumes:
  postgres_data:
  uploads_data:
