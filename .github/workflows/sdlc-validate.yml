name: SDLC Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Backend: Java / Spring Boot ────────────────────────────────────────────
  backend:
    name: Backend (Java / Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: peintures_test
          POSTGRES_USER: peintures
          POSTGRES_PASSWORD: peintures
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        working-directory: backend
        run: mvn compile --no-transfer-progress

      - name: Lint (Checkstyle)
        working-directory: backend
        run: mvn checkstyle:check --no-transfer-progress

      - name: Test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/peintures_test
          SPRING_DATASOURCE_USERNAME: peintures
          SPRING_DATASOURCE_PASSWORD: peintures
        run: mvn test --no-transfer-progress

      - name: Security audit (OWASP Dependency Check)
        working-directory: backend
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 --no-transfer-progress
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ─── Frontend: Angular / TypeScript ─────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint / ng lint)
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build (prod)
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high

  # ─── SDLC Quality Gate ───────────────────────────────────────────────────────
  sdlc-gate:
    name: SDLC Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Check CONSTITUTION.md present
        run: |
          if [ ! -f CONSTITUTION.md ]; then
            echo "FAIL: CONSTITUTION.md manquant — commissionnement requis"
            exit 1
          fi
          echo "PASS: CONSTITUTION.md présent"

      - name: Check technical debt markers
        run: |
          DEBT=$(grep -rn "TODO\|FIXME\|HACK\|XXX" \
            --include="*.java" --include="*.ts" --include="*.html" \
            --exclude-dir=node_modules --exclude-dir=.git \
            . 2>/dev/null || true)
          if [ -n "$DEBT" ]; then
            echo "FAIL: Marqueurs de dette technique détectés :"
            echo "$DEBT"
            exit 1
          fi
          echo "PASS: 0 marqueur de dette technique"

      - name: Check no secrets in source
        run: |
          SECRETS=$(grep -rn "password\s*=\s*['\"][^'\"\$]" \
            --include="*.java" --include="*.ts" --include="*.yml" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.example" \
            . 2>/dev/null || true)
          if [ -n "$SECRETS" ]; then
            echo "WARN: Possible secret en clair détecté — vérifier manuellement :"
            echo "$SECRETS"
          else
            echo "PASS: Aucun secret en clair évident"
          fi
