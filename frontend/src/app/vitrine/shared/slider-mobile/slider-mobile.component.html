<div class="insta-carousel" *ngIf="visibleTableaux.length > 0">

  <div class="carousel-wrapper">
    <div class="carousel-track" #track (scroll)="onScroll()">

      <div class="carousel-slide"
           *ngFor="let t of visibleTableaux"
           (touchstart)="onTouchStart($event)"
           (touchend)="onTouchEnd($event, t.id)">
        <img class="carousel-img" [src]="t.imageUrl" [alt]="t.titre" loading="lazy" />
      </div>

      <a class="carousel-slide carousel-slide--cta" routerLink="/oeuvres">
        <span class="cta-label">Voir la galerie complète</span>
        <span class="cta-arrow">→</span>
      </a>

    </div>

    <div class="carousel-dots">
      <span class="dot"
            *ngFor="let _ of slideIndices; let i = index"
            [class.dot--active]="i === currentIndex">
      </span>
    </div>
  </div>

  <div class="carousel-caption" *ngIf="currentTableau">
    <span class="caption-titre">{{ currentTableau.titre }}</span>
    <span class="caption-meta" *ngIf="currentTableau.type">
      {{ currentTableau.type.nom }}<ng-container *ngIf="currentTableau.periode"> — {{ currentTableau.periode }}</ng-container>
    </span>
  </div>

</div>
