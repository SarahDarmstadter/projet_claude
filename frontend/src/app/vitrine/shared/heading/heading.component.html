<nav class="site-nav">
  <a class="nav-logo" routerLink="/" (click)="closeNav()">{{ textes.get('site.artiste.nom', 'Pierre Darmstadter') }}</a>

  <button class="nav-hamburger" (click)="toggleNav()" [class.open]="navOpen"
          aria-label="Menu" [attr.aria-expanded]="navOpen"
          aria-controls="site-nav-menu">
    <span></span><span></span><span></span>
  </button>

  <div class="nav-links" [class.nav-links--open]="navOpen"
       [attr.aria-hidden]="!navOpen || null"
       [attr.inert]="!navOpen ? '' : null"
       id="site-nav-menu">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeNav()">Accueil</a>
    <div class="nav-sep"></div>
    <a routerLink="/oeuvres" routerLinkActive="active" (click)="closeNav()">Galerie</a>
    <div class="nav-sep"></div>
    <a routerLink="/artiste" routerLinkActive="active" (click)="closeNav()">Biographie</a>
    <div class="nav-sep"></div>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeNav()">Contact</a>
  </div>

  <div class="user-menu" *ngIf="auth.isAuthenticated$ | async">
    <button class="user-avatar" (click)="toggleMenu()" [class.open]="menuOpen">PD</button>
    <div class="user-dropdown" *ngIf="menuOpen">
      <a class="dropdown-item" routerLink="/admin/tableaux" (click)="closeMenu()">Mes tableaux</a>
      <a class="dropdown-item" routerLink="/admin/textes" (click)="closeMenu()">Textes du site</a>
      <div class="dropdown-sep"></div>
      <button class="dropdown-item dropdown-item--logout" (click)="logout()">Se déconnecter</button>
    </div>
  </div>
</nav>
