<div class="admin-page">
  <div class="page-header">
    <h1>Textes du site</h1>
    <div class="actions">
      <a routerLink="/" class="btn-site">← Retour au site</a>
    </div>
  </div>

  <!-- Section photo de l'artiste -->
  <div class="textes-sections">
    <div class="texte-section">
      <div class="section-head">
        <h2>Photo de l'artiste</h2>
      </div>
      <div class="photo-section">
        <div class="photo-current" *ngIf="valeurs['site.artiste.photo']">
          <img [src]="valeurs['site.artiste.photo']" alt="Photo actuelle" class="photo-current-img" />
          <span class="photo-current-label">Photo actuelle</span>
        </div>
        <div class="photo-placeholder" *ngIf="!valeurs['site.artiste.photo']">
          Aucune photo — un dégradé s'affiche à la place
        </div>
        <div class="photo-preview-wrap" *ngIf="photoPreview">
          <img [src]="photoPreview" alt="Aperçu" class="photo-preview-img" />
          <span class="photo-current-label">Aperçu</span>
        </div>
        <div class="photo-upload-row">
          <label class="champ-label">Choisir une nouvelle photo</label>
          <input type="file" accept="image/jpeg,image/png,image/webp" (change)="onPhotoChange($event)" class="photo-input" />
          <button
            class="btn-save"
            (click)="uploadPhoto()"
            [disabled]="!photoFile || uploadingPhoto"
          >
            {{ uploadingPhoto ? 'Envoi…' : 'Envoyer la photo' }}
          </button>
        </div>
      </div>
    </div>

    <!-- Sections textes -->
    <div class="texte-section" *ngFor="let section of sections">
      <div class="section-head">
        <h2>{{ section.titre }}</h2>
      </div>

      <div class="champs-grid">
        <div class="champ" *ngFor="let champ of section.champs">
          <label class="champ-label">{{ champ.label }}</label>
          <textarea
            *ngIf="champ.multiline"
            class="champ-textarea"
            [(ngModel)]="valeurs[champ.cle]"
            rows="3"
          ></textarea>
          <input
            *ngIf="!champ.multiline"
            type="text"
            class="champ-input"
            [(ngModel)]="valeurs[champ.cle]"
          />
        </div>
      </div>

      <div class="section-footer">
        <button
          class="btn-save"
          (click)="saveSection(section)"
          [disabled]="saving"
        >
          Sauvegarder
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" [class.toast--error]="toast?.error" *ngIf="toast">
  <span>{{ toast.error ? '✕' : '✓' }}</span>
  <span>{{ toast.message }}</span>
</div>
