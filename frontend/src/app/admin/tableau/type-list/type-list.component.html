<div class="admin-page narrow">
<div class="page-header">
  <h1>Types de tableaux</h1>
  <div class="actions">
    <a routerLink="/" class="btn-site">← Retour au site</a>
    <a routerLink=".." class="btn-secondary">← Liste</a>
  </div>
</div>

<p *ngIf="error" class="error">{{ error }}</p>

<ul class="type-list">
  <li *ngFor="let t of types">
    <ng-container *ngIf="editingId !== t.id">
      <span>{{ t.nom }}</span>
      <button (click)="startEdit(t)" class="btn-sm">Renommer</button>
      <button (click)="deleteType(t)" class="btn-sm btn-danger">Supprimer</button>
    </ng-container>
    <ng-container *ngIf="editingId === t.id">
      <input [(ngModel)]="editNom" (keyup.enter)="saveEdit(t)">
      <button (click)="saveEdit(t)" class="btn-sm btn-primary">OK</button>
      <button (click)="cancelEdit()" class="btn-sm">Annuler</button>
    </ng-container>
  </li>
</ul>

<div class="new-type">
  <input [(ngModel)]="newNom" placeholder="Nouveau type…" (keyup.enter)="createType()">
  <button (click)="createType()" class="btn-primary">Ajouter</button>
</div>
</div>
<app-admin-toast></app-admin-toast>
