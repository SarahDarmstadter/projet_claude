<div class="admin-page">
<div class="page-header">
  <h1>Tableaux</h1>
  <div class="actions">
    <a routerLink="types" class="btn-secondary">Gérer les types</a>
    <a routerLink="nouveau" class="btn-primary">+ Nouveau tableau</a>
  </div>
</div>

<div *ngIf="loading">Chargement…</div>

<table cdkDropList (cdkDropListDropped)="drop($event)" *ngIf="!loading">
  <thead>
    <tr>
      <th></th>
      <th>Image</th>
      <th>Titre</th>
      <th>Type</th>
      <th>Statut</th>
      <th>Visible</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let t of tableaux" cdkDrag>
      <td cdkDragHandle class="drag-handle">⠿</td>
      <td><img [src]="imageBase + t.imageUrl" [alt]="t.titre" class="miniature"></td>
      <td>{{ t.titre }}</td>
      <td>{{ t.type?.nom ?? '—' }}</td>
      <td><span class="badge badge-{{ t.statut }}">{{ t.statut }}</span></td>
      <td>{{ t.visible ? '✓' : '✗' }}</td>
      <td>
        <a [routerLink]="[t.id, 'edit']" class="btn-sm">Modifier</a>
        <button (click)="confirmDelete(t)" class="btn-sm btn-danger">Supprimer</button>
      </td>
    </tr>
  </tbody>
</table>

<!-- Modal de confirmation -->
<div class="modal-overlay" *ngIf="deleteTarget">
  <div class="modal">
    <p>Supprimer <strong>{{ deleteTarget.titre }}</strong> ?</p>
    <div class="modal-actions">
      <button (click)="cancelDelete()" class="btn-secondary">Annuler</button>
      <button (click)="executeDelete()" class="btn-danger">Supprimer</button>
    </div>
  </div>
</div>
</div>
