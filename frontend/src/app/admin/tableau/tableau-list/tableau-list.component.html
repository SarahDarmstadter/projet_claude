<div class="admin-page">
<div class="page-header">
  <h1>Tableaux</h1>
  <div class="actions">
    <a routerLink="/" class="btn-site">← Retour au site</a>
    <a routerLink="/admin/textes" class="btn-secondary">Textes du site</a>
    <a routerLink="types" class="btn-secondary">Gérer les types</a>
    <a routerLink="nouveau" class="btn-primary">+ Nouveau tableau</a>
  </div>
</div>

<div *ngIf="loading" class="loading-state">Chargement…</div>

<div class="table-responsive">
<table cdkDropList (cdkDropListDropped)="drop($event)" *ngIf="!loading">
  <thead>
    <tr>
      <th class="col-hide-mobile"></th>
      <th>Image</th>
      <th>Titre</th>
      <th class="col-hide-mobile">Type</th>
      <th class="col-hide-mobile">Statut</th>
      <th class="col-hide-mobile">Visible</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let t of tableaux" cdkDrag>
      <td cdkDragHandle class="drag-handle col-hide-mobile">⠿</td>
      <td><img [src]="imageBase + t.imageUrl" [alt]="t.titre" class="miniature"></td>
      <td>{{ t.titre }}</td>
      <td class="col-hide-mobile">{{ t.type?.nom ?? '—' }}</td>
      <td class="col-hide-mobile"><span class="badge badge-{{ t.statut }}">{{ t.statut }}</span></td>
      <td class="col-hide-mobile"><span [attr.aria-label]="t.visible ? 'Oui' : 'Non'">{{ t.visible ? '✓' : '✗' }}</span></td>
      <td>
        <a [routerLink]="[t.id, 'edit']" class="btn-sm btn-secondary">Modifier</a>
        <button (click)="confirmDelete(t)" class="btn-sm btn-danger">Supprimer</button>
      </td>
    </tr>
  </tbody>
</table>
</div>

<!-- Modal de confirmation -->
<div class="modal-overlay" *ngIf="deleteTarget" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <p id="modal-title">Supprimer <strong>{{ deleteTarget.titre }}</strong> ?</p>
    <div class="modal-actions">
      <button #cancelBtn (click)="cancelDelete()" class="btn-secondary">Annuler</button>
      <button (click)="executeDelete()" class="btn-danger">Supprimer</button>
    </div>
  </div>
</div>
</div>
<app-admin-toast></app-admin-toast>
